<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Specimen Trophy Galleri</title>

<style>
:root{
  --text:#f3f4f6;
  --muted:rgba(255,255,255,.62);
  --accent:#33b5ff;
  --bg:#02070f;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  padding:10px 8px;
  background:
    linear-gradient(rgba(0,8,18,.18),rgba(0,8,18,.32)),
    url("images/sunset_background_for_github.jpg") center center / cover no-repeat fixed,
    var(--bg);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 0%, rgba(51,181,255,.06), transparent 24%),
    radial-gradient(circle at 80% 25%, rgba(10,132,255,.04), transparent 18%);
}

.page{
  position:relative;
  z-index:1;
  width:100%;
  max-width:430px;
  margin:0 auto;
}

.shell{
  position:relative;
  min-height:760px;
  padding:4px;
  border-radius:26px;
  background:linear-gradient(180deg, rgba(58,186,255,.96), rgba(0,92,184,.86));
  box-shadow:
    0 0 0 1px rgba(58,186,255,.96),
    0 0 10px rgba(51,181,255,.30),
    0 0 20px rgba(10,132,255,.14),
    0 14px 28px rgba(0,0,0,.28);
}

.panel{
  min-height:752px;
  border-radius:22px;
  padding:12px 10px 14px;
  background:linear-gradient(180deg, rgba(5,14,30,.92), rgba(1,7,18,.97));
  border:1px solid rgba(51,181,255,.14);
  position:relative;
}

.page-back{
  position:absolute;
  top:10px;
  left:10px;
  z-index:50;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:90px;
  height:32px;
  padding:0 10px;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  font-size:12px;
  font-weight:700;
  border:1px solid rgba(51,181,255,.34);
  background:linear-gradient(180deg, rgba(2,11,23,.96), rgba(3,18,38,.90));
  box-shadow:0 0 8px rgba(51,181,255,.10);
}

.logo-wrap{
  display:flex;
  justify-content:center;
  padding-top:42px;
  margin-bottom:12px;
}

.logo{
  width:min(100%,180px);
  border-radius:22px;
  filter:
    drop-shadow(0 0 8px rgba(51,181,255,.30))
    drop-shadow(0 0 18px rgba(51,181,255,.20))
    drop-shadow(0 0 34px rgba(10,132,255,.16));
}

.title{
  text-align:center;
  margin-bottom:12px;
}

.title h1{
  font-size:20px;
  font-weight:800;
}

.title p{
  margin-top:4px;
  color:var(--muted);
  font-size:13px;
}

.gallery{
  display:grid;
  gap:14px;
  position:relative;
  z-index:2;
}

.card{
  overflow:hidden;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(5,14,30,.92), rgba(1,7,18,.97));
  border:1px solid rgba(51,181,255,.18);
  box-shadow:
    0 8px 20px rgba(0,0,0,.22),
    0 0 14px rgba(51,181,255,.08);
}

.image-wrap{
  width:100%;
  aspect-ratio:4 / 3;
  background:rgba(0,0,0,.25);
  overflow:hidden;
}

.image-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.info{
  padding:12px;
}

.info-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}

.fish{
  font-size:18px;
  font-weight:800;
}

.weight{
  font-size:15px;
  font-weight:800;
  color:#d9f3ff;
}

.meta{
  display:grid;
  gap:4px;
  font-size:13px;
  color:var(--muted);
}

.loading,
.empty,
.error{
  text-align:center;
  padding:18px 10px;
  color:var(--muted);
  font-size:14px;
}

@media (max-width:420px){
  .page-back{
    min-width:84px;
    height:30px;
    font-size:11px;
    padding:0 8px;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="shell">
    <div class="panel">

      <a href="index.html" class="page-back">← Tillbaka</a>

      <div class="logo-wrap">
        <img src="images/Specimenlogo3.png" alt="Specimen Trophy" class="logo">
      </div>

      <div class="title">
        <h1>Fångstgalleri</h1>
        <p>Senaste bilderna från Specimen Trophy</p>
      </div>

      <div id="gallery" class="gallery">
        <div class="loading">Laddar galleri...</div>
      </div>

    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybvlerPbBh45UL_oy8FMOQVc3sjYkNxXCR9M2uNaaJT98ZOsDdXcaXpfX1S7XhKv7pXg/exec";
const galleryEl = document.getElementById("gallery");

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadGallery(){
  try{
    const response = await fetch(`${SCRIPT_URL}?mode=gallery`, {
      cache:"no-store"
    });

    const data = await response.json();

    if(!response.ok || !data.success){
      throw new Error(data.error || "Kunde inte läsa galleri");
    }

    const items = data.gallery || [];

    if(items.length === 0){
      galleryEl.innerHTML = `<div class="empty">Inga bilder uppladdade ännu.</div>`;
      return;
    }

    galleryEl.innerHTML = items.map(item => `
      <article class="card">
        <a href="${escapeHtml(item.imageUrl)}" target="_blank" rel="noopener">
          <div class="image-wrap">
            <img src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.art)} ${escapeHtml(item.vikt)}g">
          </div>
        </a>

        <div class="info">
          <div class="info-top">
            <div class="fish">${escapeHtml(item.art)}</div>
            <div class="weight">${escapeHtml(item.vikt)} g</div>
          </div>

          <div class="meta">
            <div>👤 ${escapeHtml(item.deltagare)}</div>
            <div>📅 ${escapeHtml(item.datum)}</div>
          </div>
        </div>
      </article>
    `).join("");

  }catch(error){
    console.error(error);
    galleryEl.innerHTML = `<div class="error">Kunde inte läsa galleriet just nu.</div>`;
  }
}

loadGallery();
</script>
</body>
</html>
