<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topplistor</title>
  <link rel="stylesheet" href="topplistor.css?v=12" />
</head>
<body>
  <div class="page-wrap">
    <main class="app-shell">
      <header class="page-header">
        <img src="./images/logo.png" alt="Specimen Trophy" class="logo" />
      </header>

      <section class="inner-card filter-card">
        <label for="speciesSelect">Topplista</label>

        <div class="custom-dropdown">
  <button class="dropdown-button" id="dropdownButton">
    <span class="dropdown-icon">🏆</span>
    <span id="selectedValue">Björkna</span>
    <span class="dropdown-arrow">⌄</span>
  </button>

  <div class="dropdown-menu" id="dropdownMenu">
    <div class="dropdown-item" data-value="Björkna">Björkna</div>
    <div class="dropdown-item" data-value="Brax">Brax</div>
    <div class="dropdown-item" data-value="Id">Id</div>
    <div class="dropdown-item" data-value="Mört">Mört</div>
    <div class="dropdown-item" data-value="Ruda">Ruda</div>
    <div class="dropdown-item" data-value="Sarv">Sarv</div>
    <div class="dropdown-item" data-value="Sutare">Sutare</div>
    <div class="dropdown-item" data-value="Vimma">Vimma</div>
    <div class="dropdown-item" data-value="Bäste poängplockare">Bäste poängplockare</div>
  </div>
</div>
      </section>

      <section class="inner-card leaderboard-card">
        <div class="leaderboard-header">
          <h2 id="tableTitle">Björkna - Top 12</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead id="leaderboardHead"></thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="topplistor.js?v=12"></script>
</body>
</html>
