<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topplistor</title>
  <link rel="stylesheet" href="topplistor.css?v=20" />
</head>
<body>
  <div class="page-wrap">
    <main class="app-shell">
      <a href="index.html" class="page-switch">Registrera</a>

      <header class="page-header">
        <div class="logo-wrap">
          <img src="images/logo.png" alt="Specimen Trophy" class="logo" />
        </div>
      </header>

      <section class="card filter-card">
        <label class="filter-label">Topplista</label>

        <div class="custom-dropdown" id="customDropdown">
          <button type="button" class="dropdown-button" id="dropdownButton" aria-expanded="false">
            <span class="dropdown-left">
              <span class="dropdown-icon">🏆</span>
              <span id="selectedValue">Björkna</span>
            </span>
            <span class="dropdown-arrow">⌄</span>
          </button>

          <div class="dropdown-menu" id="dropdownMenu">
            <div class="dropdown-item active" data-value="Björkna">Björkna</div>
            <div class="dropdown-item" data-value="Brax">Brax</div>
            <div class="dropdown-item" data-value="Id">Id</div>
            <div class="dropdown-item" data-value="Mört">Mört</div>
            <div class="dropdown-item" data-value="Ruda">Ruda</div>
            <div class="dropdown-item" data-value="Sarv">Sarv</div>
            <div class="dropdown-item" data-value="Sutare">Sutare</div>
            <div class="dropdown-item" data-value="Vimma">Vimma</div>
            <div class="dropdown-item" data-value="Bäste poängplockare">Bäste poängplockare</div>
          </div>
        </div>
      </section>

      <section class="card leaderboard-card">
        <div class="leaderboard-header">
          <div class="leaderboard-kicker">Topplista</div>
          <h2 id="tableTitle">Björkna</h2>
        </div>

        <div class="table-wrap">
          <table id="leaderboardTable">
            <thead id="leaderboardHead"></thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="topplistor.js?v=20"></script>
</body>
</html>
