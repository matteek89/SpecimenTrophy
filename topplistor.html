<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topplistor</title>
  <link rel="stylesheet" href="topplistor.css?v=12" />
</head>
<body>
  <div class="page-wrap">
    <main class="app-shell">
      <header class="page-header">
        <img src="./images/logo.png" alt="Specimen Trophy" class="logo" />
      </header>

      <section class="inner-card filter-card">
        <label for="speciesSelect">Topplista</label>

        <div class="select-shell">
          <span class="select-icon">🏆</span>
          <select id="speciesSelect">
            <option value="Björkna">Björkna</option>
            <option value="Brax">Brax</option>
            <option value="Id">Id</option>
            <option value="Mört">Mört</option>
            <option value="Ruda">Ruda</option>
            <option value="Sarv">Sarv</option>
            <option value="Sutare">Sutare</option>
            <option value="Vimma">Vimma</option>
            <option value="Bäste poängplockare">Bäste poängplockare</option>
          </select>
          <span class="select-arrow">⌄</span>
        </div>
      </section>

      <section class="inner-card leaderboard-card">
        <div class="leaderboard-header">
          <h2 id="tableTitle">Björkna - Top 12</h2>
        </div>

        <div class="table-wrap">
          <table>
            <thead id="leaderboardHead"></thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="topplistor.js?v=12"></script>
</body>
</html>
