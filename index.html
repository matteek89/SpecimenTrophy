<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      background: linear-gradient(180deg, #dbeafe, #f8fafc);
      margin: 0;
      padding: 10px;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Registrera fångst</h1>

  <form id="form">

    <input name="Deltagare" placeholder="Deltagare" required>
    <input name="Art" placeholder="Art" required>
    <input name="Vikt" placeholder="Vikt (gram)" required>
    <input name="datum" placeholder="Datum (YYYY-MM-DD)" required>

    <input type="file" id="image">

    <button type="submit">Spara</button>

  </form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylrsBkJy8HINU6WzLZPUV-b_-7_hphpYNfj49tU4xEHaCX2S6hUeRstcUd-jNPRD_nRg/exec";

const form = document.getElementById("form");

function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];
  let imageBase64 = "";

  if (file) {
    imageBase64 = await toBase64(file);
  }

  const payload = {
    Deltagare: form.elements["Deltagare"].value,
    Art: form.elements["Art"].value,
    Vikt: form.elements["Vikt"].value,
    datum: form.elements["datum"].value,
    image: imageBase64
  };

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: new URLSearchParams(payload)
  });

  const text = await res.text();
  alert(text);

  form.reset();
});
</script>

</body>
</html>
