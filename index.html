<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Registrera fångst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22c55e">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, #dbeafe, #f8fafc);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 6px 0 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      background: #f9fafb;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
    }

    input[type="date"] {
      min-height: 48px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .success {
      display: none;
      text-align: center;
      color: #16a34a;
      font-weight: bold;
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
      }

      .container {
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Registrera fångst</h1>

  <form id="form">

    <label>Deltagare</label>
    <select name="Deltagare" required>
      <option value="">Välj deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <label>Art</label>
    <select name="Art" required>
      <option value="">Välj art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <label>Vikt (gram)</label>
    <input type="number" name="Vikt" required>

    <label for="datum">Datum</label>
    <input type="date" name="datum" id="Datum" required>

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">
    ✔ Sparat!
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVPDW2B7Y6O982O7Iijn7VPgLhKMhJzuRKQ3ujGZqMkfwn9ohpymvva3XCGzFHYcYMwg/exec";

  const idag = new Date().toISOString().split("T")[0];
  document.getElementById("datum").value = idag;

  document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = document.getElementById("form");

    const data = {
      deltagare: form.deltagare.value,
      art: form.art.value,
      vikt: form.vikt.value,
      datum: form.datum.value
    };

    try {
     await fetch(SCRIPT_URL, {
  method: "POST",
  mode: "no-cors",  // 🔥 DETTA ÄR FIXEN
  body: JSON.stringify(data)
});

      document.getElementById("success").style.display = "block";
      form.reset();
      document.getElementById("datum").value = idag;

    } catch (err) {
      alert("Fel vid sparning");
      console.error(err);
    }
  });
</script>

</body>
</html>
