<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #dbeafe, #f8fafc);
      padding: 10px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 22px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    input[type="file"] {
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Specimen Trophy</h1>

  <form id="form">

    <!-- 👥 Deltagare -->
    <select name="Deltagare" required>
      <option value="">Välj deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <!-- 🎣 Art -->
    <select name="Art" required>
      <option value="">Välj art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <!-- ⚖️ Vikt -->
    <input name="Vikt" placeholder="Vikt (gram)" required>

    <!-- 📅 Datum -->
    <input type="date" name="datum" required>

    <!-- 📸 Bild -->
    <input type="file" id="image">

    <button type="submit">Spara fångst</button>
  </form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbykz0oB-DEKWmxPReP0RosAe1qMV33AUsg1oy815tOw/dev";

const form = document.getElementById("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData();

  formData.append("Deltagare", form.elements["Deltagare"].value);
  formData.append("Art", form.elements["Art"].value);
  formData.append("Vikt", form.elements["Vikt"].value);
  formData.append("datum", form.elements["datum"].value);

  const file = document.getElementById("image").files[0];
  if (file) {
    formData.append("image", file);
  }

  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: formData
  });

  const text = await res.text();
  alert(text);

  form.reset();
});
</script>
  
</body>
</html>
