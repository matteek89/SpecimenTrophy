<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      font-size: 16px;
    }

    .success {
      display: none;
      text-align: center;
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎣 Specimen Trophy</h2>

  <form id="form">

    <select name="Deltagare" required>
      <option value="">Deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <select name="Art" required>
      <option value="">Art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <input type="number" name="Vikt" placeholder="Vikt (gram)" required>

    <input type="date" name="datum" id="datum" required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ygilpwedyxbkvwupxngn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnaWxwd2VkeXhia3Z3dXB4bmduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTA1MDksImV4cCI6MjA5MTU4NjUwOX0.29O-vQS2GTx4PZcATXvOvR0_gRC7wXLIURbguafjSpI"
);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjzj58u3ELKcz6UcpQpbYV0Vxj7UmgH-ri7GLad5obFLVuZH5G5v1l-FTPYEBk-106rQ/exec";

const form = document.getElementById("form");
const datumInput = document.getElementById("datum");

datumInput.value = new Date().toISOString().split("T")[0];

/* 📸 upload (påverkar inte flödet om det failar) */
async function uploadImage(file) {
  if (!file) return "";

  try {
    const fileName = Date.now() + "-" + file.name;

    const { error } = await supabase
      .storage
      .from("specimen-trophy")
      .upload(fileName, file);

    if (error) {
      console.log("Supabase fail:", error.message);
      return "";
    }

    const { data } = supabase
      .storage
      .from("specimen-trophy")
      .getPublicUrl(fileName);

    return data.publicUrl;

  } catch (err) {
    console.log("Upload error:", err);
    return "";
  }
}

/* 🚀 submit */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];

  const payload = {
    Deltagare: form.elements["Deltagare"].value,
    Art: form.elements["Art"].value,
    Vikt: form.elements["Vikt"].value,
    datum: form.elements["datum"].value,
    image: ""
  };

  /* 🔥 1. Skicka ALLTID till Google Sheets */
 await fetch(SCRIPT_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body: new URLSearchParams(payload)
});

  document.getElementById("success").style.display = "block";

  /* 🔥 2. Ladda upp bild separat (kan inte krascha) */
  if (file) {
    uploadImage(file)
      .then(url => console.log("Bild uppladdad:", url))
      .catch(err => console.log("Bild fail:", err));
  }

  form.reset();
  datumInput.value = new Date().toISOString().split("T")[0];
});
</script>

</body>
</html>
