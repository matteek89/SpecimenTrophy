<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(180deg, #dbeafe, #f8fafc);
      padding: 10px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 10px;
    }

    select, input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Specimen Trophy</h1>

  <form id="form">

    <!-- 👥 Deltagare -->
    <select name="Deltagare" required>
      <option value="">Välj deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <!-- 🎣 Art -->
    <select name="Art" required>
      <option value="">Välj art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <input name="Vikt" placeholder="Vikt (gram)" required>

    <input type="date" name="datum" required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara fångst</button>

  </form>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylrsBkJy8HINU6WzLZPUV-b_-7_hphpYNfj49tU4xEHaCX2S6hUeRstcUd-jNPRD_nRg/exec";

const form = document.getElementById("form");

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];

  let imageBase64 = "";

  try {
    if (file) {
      imageBase64 = await toBase64(file);
    }

    const payload = {
      Deltagare: form.elements["Deltagare"].value,
      Art: form.elements["Art"].value,
      Vikt: form.elements["Vikt"].value,
      datum: form.elements["datum"].value,
      image: imageBase64
    };

    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams(payload)
    });

    const text = await res.text();
    alert(text);

    form.reset();

  } catch (err) {
    alert("Fel vid uppladdning");
    console.error(err);
  }
});
</script>

</body>
</html>
