<style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background: linear-gradient(180deg, #dbeafe, #f8fafc);
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  h1 {
    margin-bottom: 15px;
    font-size: 22px;
    text-align: center;
  }

  input, select {
    width: 100%;
    padding: 16px;
    margin: 8px 0;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 16px;
    background: #f9fafb;
  }

  input:focus, select:focus {
    outline: none;
    border: 1px solid #2563eb;
    background: white;
  }

  input[type="file"] {
    padding: 12px;
  }

  button {
    width: 100%;
    padding: 18px;
    margin-top: 12px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }

  button:active {
    transform: scale(0.98);
  }

  .success {
    display: none;
    color: #16a34a;
    font-weight: bold;
    margin-top: 12px;
    font-size: 16px;
    text-align: center;
  }

  /* 📱 EXTRA MOBILFIX */
  @media (max-width: 480px) {
    .container {
      padding: 18px;
      border-radius: 16px;
    }

    h1 {
      font-size: 20px;
    }

    input, select {
      font-size: 16px;
      padding: 14px;
    }

    button {
      font-size: 17px;
      padding: 16px;
    }
  }
</style>
