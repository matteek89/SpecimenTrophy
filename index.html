<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Specimen Trophy</title>

<style>
:root{
  --text:#f3f4f6;
  --muted:rgba(255,255,255,.58);
  --orange:#ff9800;
  --green:#19d458;
  --error:#ff6b6b;
}

*{box-sizing:border-box}

html,body{
  min-height:100%;
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

body{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:10px 8px;
  background:
    linear-gradient(rgba(4,8,16,.34),rgba(4,8,16,.56)),
    url("images/sunset_background_for_github.jpg") center center / cover no-repeat fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,145,0,.12), transparent 24%),
    radial-gradient(circle at 80% 25%, rgba(255,120,0,.10), transparent 18%),
    radial-gradient(circle at 20% 20%, rgba(255,170,70,.06), transparent 24%),
    linear-gradient(to bottom, rgba(255,140,0,.03), transparent 25%);
}

.page{
  position:relative;
  z-index:1;
  width:100%;
  max-width:430px;
  display:flex;
  justify-content:center;
}

.frame{
  width:100%;
  max-width:370px;
  padding:4px;
  border-radius:26px;
  position:relative;
  background:linear-gradient(180deg, rgba(255,153,0,.95), rgba(255,106,0,.82));
  box-shadow:
    0 0 0 1px rgba(255,153,0,.96),
    0 0 10px rgba(255,145,0,.28),
    0 0 20px rgba(255,106,0,.10),
    0 14px 28px rgba(0,0,0,.24);
}

.frame::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:26px;
  pointer-events:none;
  box-shadow:
    inset 0 0 0 1px rgba(255,170,40,.92),
    0 0 6px rgba(255,153,0,.12);
}

.panel{
  width:100%;
  background:
    linear-gradient(180deg, rgba(5,16,34,.90), rgba(2,10,22,.95));
  border:1px solid rgba(255,138,0,.14);
  border-radius:22px;
  padding:12px 10px 14px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 8px 20px rgba(0,0,0,.20);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  position:relative;
  overflow:visible;
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:22px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.04), transparent 18%, transparent 82%, rgba(255,153,0,.03));
}

.page-switch{
  position:absolute;
  top:10px;
  right:10px;
  z-index:50;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:84px;
  height:32px;
  padding:0 10px;
  border-radius:12px;
  text-decoration:none;
  color:#ffffff;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2px;
  border:1px solid rgba(255,153,0,.30);
  background:linear-gradient(
    180deg,
    rgba(2,11,23,.96),
    rgba(3,18,38,.90)
  );
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 4px 10px rgba(0,0,0,.16),
    0 0 8px rgba(255,145,0,.08);
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
}

.page-switch:hover{
  transform:translateY(-1px);
  border-color:rgba(255,153,0,.55);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 8px 18px rgba(0,0,0,.18),
    0 0 12px rgba(255,145,0,.16);
}

.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
  position:relative;
  z-index:1;
  padding-top:42px;
}

.logo{
  width:min(100%,180px);
  display:block;
  border-radius:22px;
  box-shadow:
    0 0 10px rgba(255,153,0,.22),
    0 0 22px rgba(255,106,0,.12);
}

form{
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
  z-index:2;
}

.field,
.custom-select{
  position:relative;
  display:grid;
  grid-template-columns:26px 1fr 20px;
  align-items:center;
  gap:10px;
  min-height:66px;
  padding:11px 12px;
  border-radius:16px;
  background:linear-gradient(90deg, rgba(2,11,23,.95), rgba(3,18,38,.88));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 6px 14px rgba(0,0,0,.14);
  transition:
    box-shadow .18s ease,
    border-color .18s ease,
    background .18s ease,
    transform .18s ease;
}

.field.compact-rightless{
  grid-template-columns:26px 1fr;
}

.field:hover,
.custom-select:hover{
  border-color:rgba(255,153,0,.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 8px 18px rgba(0,0,0,.16),
    0 0 12px rgba(255,145,0,.08);
  transform:translateY(-1px);
}

.custom-select{
  cursor:pointer;
  z-index:20;
}

.custom-select.open{
  z-index:30;
}

.field-icon,
.field-end{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--orange);
  align-self:flex-start;
  padding-top:2px;
}

.field-body{
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:40px;
}

.field-label{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.92);
  margin-bottom:4px;
  line-height:1;
}

.field-icon svg,
.field-end svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.field input[type="number"],
.field input[type="text"],
.field input[type="date"],
.selected,
.upload-text,
.code-input{
  width:100%;
  border:0;
  background:transparent !important;
  color:var(--text);
  font-size:16px;
  line-height:1.2;
  outline:none;
  padding:0;
  margin:0;
  font-weight:500;
  min-height:20px;
  display:flex;
  align-items:center;
  appearance:none;
  -webkit-appearance:none;
  box-shadow:none;
}

.field input[type="date"]{
  color-scheme:dark;
  text-align:left;
}

.field input[type="date"]::-webkit-date-and-time-value{
  text-align:left;
}

.field input::placeholder,
.code-input::placeholder{
  color:var(--muted);
  opacity:1;
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{
  -webkit-appearance:none;
  margin:0;
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus{
  -webkit-text-fill-color:#f3f4f6;
  transition:background-color 5000s ease-in-out 0s;
  box-shadow:0 0 0px 1000px transparent inset;
}

.selected{
  color:var(--muted);
  cursor:pointer;
  user-select:none;
}

.selected.active{
  color:var(--text);
}

.custom-select .field-end{
  transition:transform .2s ease;
}

.custom-select.open .field-end{
  transform:rotate(180deg);
}

.options{
  display:none;
  position:absolute;
  left:0;
  right:0;
  top:calc(100% + 6px);
  background:rgba(6,15,28,.98);
  border:1px solid rgba(255,138,0,.24);
  border-radius:14px;
  z-index:9999;
  box-shadow:
    0 0 14px rgba(255,138,0,.12),
    0 10px 24px rgba(0,0,0,.24);
  max-height:190px;
  overflow-y:auto;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  opacity:0;
  transform:translateY(-6px);
  animation:dropdownIn .18s ease forwards;
}

@keyframes dropdownIn{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.options div{
  padding:10px 12px;
  font-size:14px;
  color:#f3f4f6;
  border-top:1px solid rgba(255,255,255,.05);
  text-align:center;
  cursor:pointer;
  transition:background .14s ease;
}

.options div:first-child{
  border-top:0;
}

.options div:hover{
  background:rgba(255,138,0,.12);
}

.options::-webkit-scrollbar{
  width:8px;
}

.options::-webkit-scrollbar-thumb{
  background:rgba(255,138,0,.35);
  border-radius:999px;
}

.file-input{
  display:none;
}

.upload-field{
  cursor:pointer;
}

.upload-text{
  color:rgba(255,255,255,.92);
  font-size:15px;
  font-weight:600;
}

.upload-subtext{
  margin-top:4px;
  color:var(--muted);
  font-size:11px;
  line-height:1.3;
}

.submit-btn,
.modal-btn{
  border:0;
  border-radius:16px;
  font-size:18px;
  font-weight:800;
  color:white;
  cursor:pointer;
}

.submit-btn{
  margin-top:4px;
  height:54px;
  background:linear-gradient(180deg, #29d454 0%, #12b341 50%, #079734 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 0 12px rgba(28,209,79,.22),
    0 8px 18px rgba(0,0,0,.22);
  transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;
  z-index:1;
}

.submit-btn:hover{
  transform:translateY(-1px);
  filter:brightness(1.03);
}

.success{
  display:none;
  margin-top:10px;
  color:var(--green);
  font-weight:700;
  font-size:17px;
  text-align:center;
  align-items:center;
  justify-content:center;
  gap:7px;
  text-shadow:0 0 10px rgba(25,212,88,.22);
  position:relative;
  z-index:1;
}

.success.show{
  display:flex;
}

.date-field{
  cursor:pointer;
}

.date-field input[type=date]::-webkit-calendar-picker-indicator{
  opacity:0;
  position:absolute;
  width:100%;
  height:100%;
  cursor:pointer;
  left:0;
  top:0;
}

.invalid-field{
  border-color:var(--error) !important;
  box-shadow:
    0 0 0 1px rgba(255,107,107,.20),
    0 0 14px rgba(255,107,107,.18),
    inset 0 1px 0 rgba(255,255,255,.03) !important;
}

.error-text{
  display:none;
  margin-top:5px;
  color:var(--error);
  font-size:12px;
  line-height:1.2;
  animation:fadeIn .15s ease;
}

.invalid-field .error-text{
  display:block;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-2px);}
  to{opacity:1; transform:translateY(0);}
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:99999;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal.show{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:320px;
  background:linear-gradient(180deg, rgba(5,16,34,.97), rgba(2,10,22,.99));
  border:1px solid rgba(255,138,0,.22);
  border-radius:18px;
  padding:18px 16px;
  box-shadow:
    0 0 18px rgba(255,153,0,.18),
    0 14px 30px rgba(0,0,0,.35);
  text-align:center;
}

.modal-box h3{
  margin:0 0 8px;
  font-size:18px;
}

.modal-box p{
  margin:0 0 14px;
  color:var(--muted);
  font-size:14px;
  line-height:1.4;
}

.code-input{
  height:52px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:linear-gradient(90deg, rgba(2,11,23,.95), rgba(3,18,38,.88)) !important;
  text-align:center;
  font-size:22px;
  letter-spacing:4px;
}

.code-input:focus{
  border-color:rgba(255,153,0,.45);
  box-shadow:0 0 12px rgba(255,153,0,.14);
}

.code-error{
  display:none;
  color:var(--error);
  font-size:12px;
  margin-top:8px;
}

.code-error.show{
  display:block;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.modal-btn{
  flex:1;
  height:46px;
  font-size:15px;
  font-weight:700;
}

.cancel-btn{
  background:#1f2937;
}

.confirm-btn{
  background:linear-gradient(180deg, #29d454 0%, #12b341 50%, #079734 100%);
}

@media (max-width:420px){
  body{
    padding:10px 8px;
  }

  .page{
    max-width:100%;
  }

  .frame{
    max-width:100%;
    width:100%;
  }

  .panel{
    padding:12px 10px 14px;
  }

  .logo{
    width:min(100%,182px);
  }

  .field,
  .custom-select{
    min-height:66px;
    padding:11px 12px;
    gap:10px;
  }

  .field input[type="number"],
  .field input[type="text"],
  .field input[type="date"],
  .selected,
  .upload-text{
    font-size:16px;
  }

  .submit-btn{
    height:54px;
    font-size:18px;
  }

  .page-switch{
    top:10px;
    right:10px;
    min-width:80px;
    height:30px;
    font-size:11px;
    padding:0 8px;
  }
}
</style>
</head>

<body>
<div class="page">
  <div class="frame">
    <div class="panel">

      <a href="topplistor.html" class="page-switch">Topplistor</a>

      <div class="logo-wrap">
        <img src="images/logo.png" alt="Specimen Trophy" class="logo">
      </div>

      <form id="form" novalidate>

        <div class="custom-select" data-name="Deltagare" data-placeholder="Välj deltagare" id="deltagareField">
          <div class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div class="field-body">
            <div class="field-label">Deltagare</div>
            <div class="selected">Välj deltagare</div>
            <div class="error-text">Fyll i detta fält</div>
          </div>
          <div class="field-end" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
          <div class="options"></div>
        </div>
        <input type="hidden" name="Deltagare">

        <div class="custom-select" data-name="Art" data-placeholder="Välj art" id="artField">
          <div class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 12s3-4 9-4 9 4 9 4-3 4-9 4-9-4-9-4Z"></path>
              <path d="M7 8 4 5"></path>
              <path d="M7 16 4 19"></path>
              <path d="M17 8l3-3"></path>
              <path d="M17 16l3 3"></path>
            </svg>
          </div>
          <div class="field-body">
            <div class="field-label">Art</div>
            <div class="selected">Välj art</div>
            <div class="error-text">Fyll i detta fält</div>
          </div>
          <div class="field-end" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
          <div class="options"></div>
        </div>
        <input type="hidden" name="Art">

        <div class="field" id="viktField">
          <div class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6 5h12"></path>
              <path d="M8 5l1-2h6l1 2"></path>
              <path d="M7 5l-1 13a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2L17 5"></path>
              <circle cx="12" cy="13" r="2.5"></circle>
            </svg>
          </div>
          <div class="field-body">
            <div class="field-label">Vikt (gram)</div>
            <input type="number" name="Vikt" id="viktInput" placeholder="Ange vikt">
            <div class="error-text">Fyll i detta fält</div>
          </div>
          <div></div>
        </div>

        <label class="field date-field compact-rightless" id="datumField">
          <div class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <path d="M16 2v4"></path>
              <path d="M8 2v4"></path>
              <path d="M3 10h18"></path>
            </svg>
          </div>
          <div class="field-body">
            <div class="field-label">Datum</div>
            <input type="date" id="datum" name="datum">
            <div class="error-text">Fyll i detta fält</div>
          </div>
        </label>

        <label class="field upload-field compact-rightless" for="image" id="bildField">
          <div class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <circle cx="9" cy="10" r="1.2"></circle>
              <path d="m21 15-5-5L5 19"></path>
            </svg>
          </div>
          <div class="field-body">
            <div class="field-label">Bild</div>
            <div class="upload-text">Lägg till bild</div>
            <div class="upload-subtext" id="uploadText">Välj bild från kameran eller galleri</div>
            <div class="error-text">Fyll i detta fält</div>
          </div>
        </label>
        <input type="file" id="image" class="file-input" accept="image/*">

        <button type="submit" class="submit-btn">SPARA</button>

      </form>

      <div class="success" id="success">✔ Sparat!</div>

    </div>
  </div>
</div>

<div id="codeModal" class="modal">
  <div class="modal-box">
    <h3>Bekräfta med kod</h3>
    <p>Skriv in den 4-siffriga koden för att spara.</p>

    <input type="password" id="codeInput" class="code-input" maxlength="4" inputmode="numeric" placeholder="0000">

    <div id="codeError" class="code-error">Fel kod</div>

    <div class="modal-actions">
      <button type="button" class="modal-btn cancel-btn" id="cancelCodeBtn">Avbryt</button>
      <button type="button" class="modal-btn confirm-btn" id="confirmCodeBtn">Bekräfta</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybvlerPbBh45UL_oy8FMOQVc3sjYkNxXCR9M2uNaaJT98ZOsDdXcaXpfX1S7XhKv7pXg/exec";

const form = document.getElementById("form");
const success = document.getElementById("success");
const imageInput = document.getElementById("image");
const uploadText = document.getElementById("uploadText");

const deltagareField = document.getElementById("deltagareField");
const artField = document.getElementById("artField");
const viktField = document.getElementById("viktField");
const datumField = document.getElementById("datumField");
const bildField = document.getElementById("bildField");
const viktInput = document.getElementById("viktInput");
const datumInput = document.getElementById("datum");

const codeModal = document.getElementById("codeModal");
const codeInput = document.getElementById("codeInput");
const codeError = document.getElementById("codeError");
const confirmCodeBtn = document.getElementById("confirmCodeBtn");
const cancelCodeBtn = document.getElementById("cancelCodeBtn");

let pendingSubmit = false;
let isSubmitting = false;

function showMessage(text, color = "#19d458") {
  success.textContent = text;
  success.style.color = color;
  success.classList.add("show");
}

function hideMessage() {
  success.classList.remove("show");
  success.textContent = "✔ Sparat!";
  success.style.color = "";
}

function toBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function closeAllSelects(){
  document.querySelectorAll(".custom-select").forEach(s => {
    s.classList.remove("open");
    const options = s.querySelector(".options");
    if(options) options.style.display = "none";
  });
}

function clearInvalidStates(){
  [deltagareField, artField, viktField, datumField, bildField].forEach(el => {
    el.classList.remove("invalid-field");
  });
}

function validateForm(){
  clearInvalidStates();
  let valid = true;

  if(!form.Deltagare.value){
    deltagareField.classList.add("invalid-field");
    valid = false;
  }

  if(!form.Art.value){
    artField.classList.add("invalid-field");
    valid = false;
  }

  if(!form.Vikt.value){
    viktField.classList.add("invalid-field");
    valid = false;
  }

  if(!form.datum.value){
    datumField.classList.add("invalid-field");
    valid = false;
  }

  if(!imageInput.files || !imageInput.files[0]){
    bildField.classList.add("invalid-field");
    valid = false;
  }

  return valid;
}

function openCodeModal(){
  codeInput.value = "";
  codeError.classList.remove("show");
  codeModal.classList.add("show");
  setTimeout(() => codeInput.focus(), 50);
}

function closeCodeModal(){
  codeModal.classList.remove("show");
  codeInput.value = "";
  codeError.classList.remove("show");
  pendingSubmit = false;
}

async function sendForm(){
  if (isSubmitting) return;
  isSubmitting = true;

  try {
    hideMessage();

    const file = imageInput.files[0];
    let imageBase64 = "";

    if (file) {
      imageBase64 = await toBase64(file);
    }

    const payload = new URLSearchParams({
      Deltagare: form.Deltagare.value,
      Art: form.Art.value,
      Vikt: form.Vikt.value,
      datum: form.datum.value,
      image: imageBase64
    });

    await fetch(SCRIPT_URL, {
      method: "POST",
      body: payload,
      mode: "no-cors"
    });

    showMessage("✔ Sparat!", "#19d458");

    form.reset();
    uploadText.textContent = "Välj bild från kameran eller galleri";

    document.querySelectorAll(".custom-select").forEach(select => {
      const selected = select.querySelector(".selected");
      const placeholder = select.dataset.placeholder || select.dataset.name;
      selected.textContent = placeholder;
      selected.classList.remove("active");
    });

    document.querySelector("input[name='Deltagare']").value = "";
    document.querySelector("input[name='Art']").value = "";
    clearInvalidStates();

  } catch (error) {
    console.error("Fel vid sparning:", error);
    showMessage("⚠ Kunde inte spara", "#ff6b6b");
  } finally {
    isSubmitting = false;
  }
}

async function loadDropdownData() {
  try {
    const response = await fetch(SCRIPT_URL);
    const data = await response.json();

    fillOptions("deltagareField", data.deltagare || []);
    fillOptions("artField", data.arter || []);
  } catch (error) {
    console.error("Kunde inte läsa dropdown-data:", error);
  }
}

function fillOptions(fieldId, items) {
  const field = document.getElementById(fieldId);
  const options = field.querySelector(".options");
  options.innerHTML = "";

  items.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item;
    options.appendChild(div);
  });
}

function initializeCustomSelects(){
  document.querySelectorAll(".custom-select").forEach(select => {
    const selected = select.querySelector(".selected");
    const options = select.querySelector(".options");
    const hidden = document.querySelector(`input[name="${select.dataset.name}"]`);
    const placeholder = select.dataset.placeholder || select.dataset.name;

    function toggleSelect(e){
      e.stopPropagation();
      const isOpen = select.classList.contains("open");
      closeAllSelects();
      if(!isOpen){
        select.classList.add("open");
        options.style.display = "block";
      }
    }

    selected.addEventListener("click", toggleSelect);
    select.querySelector(".field-end").addEventListener("click", toggleSelect);

    options.querySelectorAll("div").forEach(option => {
      option.onclick = () => {
        selected.textContent = option.textContent;
        selected.classList.add("active");
        hidden.value = option.textContent;
        select.classList.remove("invalid-field");
        select.classList.remove("open");
        options.style.display = "none";
      };
    });

    selected.textContent = placeholder;
  });
}

document.addEventListener("click", e => {
  if(!e.target.closest(".custom-select")){
    closeAllSelects();
  }
});

datumField.addEventListener("click", () => {
  if(datumInput.showPicker){
    datumInput.showPicker();
  }else{
    datumInput.focus();
    datumInput.click();
  }
});

imageInput.addEventListener("change", () => {
  if(imageInput.files && imageInput.files[0]){
    uploadText.textContent = imageInput.files[0].name;
    bildField.classList.remove("invalid-field");
  }else{
    uploadText.textContent = "Välj bild från kameran eller galleri";
  }
});

viktInput.addEventListener("input", () => {
  if(viktInput.value) viktField.classList.remove("invalid-field");
});

datumInput.addEventListener("input", () => {
  if(datumInput.value) datumField.classList.remove("invalid-field");
});

form.addEventListener("submit", e => {
  e.preventDefault();
  hideMessage();

  if(!validateForm()) return;

  pendingSubmit = true;
  openCodeModal();
});

confirmCodeBtn.addEventListener("click", async () => {
  if(!pendingSubmit) return;

  if(codeInput.value !== "2026"){
    codeError.classList.add("show");
    codeInput.focus();
    codeInput.select();
    return;
  }

  codeError.classList.remove("show");
  codeModal.classList.remove("show");
  pendingSubmit = false;

  await sendForm();
});

cancelCodeBtn.addEventListener("click", closeCodeModal);

codeInput.addEventListener("input", () => {
  codeError.classList.remove("show");
});

codeInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    confirmCodeBtn.click();
  }

  if(e.key === "Escape"){
    closeCodeModal();
  }
});

codeModal.addEventListener("click", (e) => {
  if(e.target === codeModal){
    closeCodeModal();
  }
});

(async function startApp() {
  await loadDropdownData();
  initializeCustomSelects();
})();
</script>
</body>
</html>
