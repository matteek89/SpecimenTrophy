<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f1f5f9, #e2e8f0);
      margin: 0;
      padding: 16px;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    h2 {
      text-align: center;
      margin-bottom: 16px;
      font-size: 22px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;

      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f9fafb;

      outline: none;
    }

    select:focus,
    input:focus {
      border-color: #22c55e;
      background: #fff;
    }

    input[type="file"] {
      background: white;
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;

      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;

      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .success {
      display: none;
      text-align: center;
      color: #16a34a;
      font-weight: bold;
      margin-top: 12px;
    }

    /* 📱 MOBILE OPTIMERING */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 14px;
        border-radius: 14px;
      }

      h2 {
        font-size: 20px;
      }

      select,
      input {
        font-size: 15px;
        padding: 13px;
      }

      button {
        font-size: 16px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎣 Specimen Trophy</h2>

  <form id="form">

    <select name="Deltagare" required>
      <option value="">Deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <select name="Art" required>
      <option value="">Art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <input type="number" name="Vikt" placeholder="Vikt (gram)" required>

    <input type="date" name="datum" id="datum" required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://ygilpwedyxbkvwupxngn.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnaWxwd2VkeXhia3Z3dXB4bmduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTA1MDksImV4cCI6MjA5MTU4NjUwOX0.29O-vQS2GTx4PZcATXvOvR0_gRC7wXLIURbguafjSpI"
);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypZ9Khb5M9_hS5AScLq47ESgh1PjErPXGDzGc7SviOYmBpwok9TIRvORKAj99AtxIdzw/exec";

const form = document.getElementById("form");
const datumInput = document.getElementById("datum");

datumInput.value = new Date().toISOString().split("T")[0];

/* 📸 Upload (stabil) */
async function uploadImage(file) {
  if (!file) return "";

  try {
    const fileName = Date.now() + "-" + file.name;

    const { error } = await supabaseClient
      .storage
      .from("specimen-trophy")
      .upload(fileName, file);

    if (error) {
      console.log("Upload error:", error.message);
      return "";
    }

    const { data } = supabaseClient
      .storage
      .from("specimen-trophy")
      .getPublicUrl(fileName);

    return data.publicUrl;

  } catch (err) {
    console.log("Upload failed:", err);
    return "";
  }
}

/* 🚀 Submit */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];

  let imageUrl = "";

  if (file) {
    imageUrl = await uploadImage(file);
  }

  const payload = {
    Deltagare: form.elements["Deltagare"].value,
    Art: form.elements["Art"].value,
    Vikt: form.elements["Vikt"].value,
    datum: form.elements["datum"].value,
    image: imageUrl
  };

  console.log("SEND:", payload);

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: new URLSearchParams(payload)
    });

    document.getElementById("success").style.display = "block";

    form.reset();
    datumInput.value = new Date().toISOString().split("T")[0];

  } catch (err) {
    console.error("Error:", err);
    alert("Kunde inte spara");
  }
});
</script>

</body>
</html>
