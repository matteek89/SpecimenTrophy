<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      background: linear-gradient(#f1f5f9, #e2e8f0);
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: white;
      padding: 18px;
      border-radius: 16px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      text-align: center;
      background: #f9fafb;
    }

    button {
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: green;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎣 Specimen Trophy</h2>

  <form id="form">

    <select name="Deltagare" required>
      <option value="">Deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <select name="Art" required>
      <option value="">Art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <input type="number" name="Vikt" placeholder="Vikt (gram)" required>

    <!-- 📅 DATUM FIX -->
    <input type="text" name="datum" placeholder="Datum"
      onfocus="this.type='date'"
      onblur="if(!this.value)this.type='text'"
      required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylrsBkJy8HINU6WzLZPUV-b_-7_hphpYNfj49tU4xEHaCX2S6hUeRstcUd-jNPRD_nRg/exec";

/* 📸 BASE64 */
function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];
  let imageBase64 = "";

  if (file) {
    imageBase64 = await toBase64(file);
  }

  const payload = {
    Deltagare: form.Deltagare.value,
    Art: form.Art.value,
    Vikt: form.Vikt.value,
    datum: form.datum.value,
    image: imageBase64
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: new URLSearchParams(payload)
  });

  document.getElementById("success").style.display = "block";
  form.reset();
});

</script>

</body>
</html>
