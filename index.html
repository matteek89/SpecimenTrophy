<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Specimensamling av olika fiskar. Använd vårt verktyg för att enkelt ladda upp och hantera dina fiskefynd!">
    <title>Specimen Trophy</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Specimen Trophy</h1>
        <nav>
            <ul>
                <li><a href="#">Hem</a></li>
                <li><a href="#">Om</a></li>
                <li><a href="#">Kontakta</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Ladda upp din fångst</h2>
            <form id="specimenForm" action="/upload" method="post" enctype="multipart/form-data">
                <label for="specimenName">Artens namn:</label>
                <input type="text" id="specimenName" name="specimenName" required aria-required="true">
                <br>

                <label for="specimenImage">Upload image:</label>
                <input type="file" id="specimenImage" name="specimenImage" accept="image/*" required aria-required="true">
                <br>

                <label for="notes">Anteckningar:</label>
                <textarea id="notes" name="notes" rows="4" required></textarea>
                <br>

                <button type="submit">Ladda upp</button>
                <div id="loading" style="display: none;">Laddar...</div>
                <div id="error" style="color: red; display: none;">Det finns ett fel med din uppladdning. Kontrollera och försök igen.</div>
            </form>
            <div id="preview" style="display: none;">
                <h3>Förhandsgranskning:</h3>
                <p><strong>Namn:</strong> <span id="previewName"></span></p>
                <img id="previewImage" src="#" alt="Förhandsgranskning av fångst">
                <p><strong>Anteckningar:</strong> <span id="previewNotes"></span></p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Specimen Trophy</p>
    </footer>

    <script>
        const input = document.getElementById('specimenImage');
        const preview = document.getElementById('preview');
        const previewName = document.getElementById('previewName');
        const previewNotes = document.getElementById('previewNotes');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        // Handle file input change for preview
        input.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('previewImage').src = e.target.result;
                    previewName.textContent = document.getElementById('specimenName').value;
                    previewNotes.textContent = document.getElementById('notes').value;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
            }
        });

        // Handle form submission
        document.getElementById('specimenForm').addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent the default form submission
            loading.style.display = 'block';
            error.style.display = 'none';
            // Simulate file upload process
            setTimeout(() => {
                loading.style.display = 'none';
                alert('Fångsten har laddats upp!');
            }, 2000);
        });
    </script>
</body>
</html>
