<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --border: #e5e7eb;
    }

    body.dark {
      --bg: #0b1220;
      --card: #111827;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 30px 16px;
      transition: 0.3s;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 10px 4px;
    }

    .nav h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }

    .toggle {
      cursor: pointer;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 20px;
      animation: fade 0.6s ease;
    }

    .logo {
      max-width: 260px;
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* CARD */
    form {
      background: var(--card);
      padding: 22px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: fade 0.6s ease;
    }

    input {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      font-size: 15px;
      background: transparent;
      color: var(--text);
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    button {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 14px;
      color: #22c55e;
      font-weight: 600;
    }

    /* CUSTOM SELECT */
    .custom-select {
      position: relative;
    }

    .selected {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
    }

    .selected.active {
      color: var(--text);
    }

    .options {
      display: none;
      position: absolute;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 8px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      animation: fade 0.2s ease;
    }

    .options div {
      padding: 12px;
      text-align: center;
      cursor: pointer;
    }

    .options div:hover {
      background: rgba(37,99,235,0.1);
    }

    /* ANIMATION */
    @keyframes fade {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <h1>Specimen Trophy</h1>
    <div class="toggle" onclick="toggleDark()">🌙 / ☀️</div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <img src="images/logo.png" class="logo">
  </div>

  <form id="form">

    <!-- Deltagare -->
    <div class="custom-select" data-name="Deltagare">
      <div class="selected">Deltagare</div>
      <div class="options">
        <div>Lars Boström</div>
        <div>Oliver Jansson</div>
        <div>Anders Boström</div>
        <div>Stefan Widh</div>
        <div>Roger Norling</div>
        <div>Micke Karlsson</div>
        <div>Emil Larsson</div>
        <div>Sonny Pettersson</div>
        <div>Christian Rebello</div>
        <div>Patrik Byström</div>
      </div>
    </div>
    <input type="hidden" name="Deltagare">

    <!-- Art -->
    <div class="custom-select" data-name="Art">
      <div class="selected">Art</div>
      <div class="options">
        <div>Björkna</div>
        <div>Brax</div>
        <div>Id</div>
        <div>Mört</div>
        <div>Ruda</div>
        <div>Sutare</div>
      </div>
    </div>
    <input type="hidden" name="Art">

    <input type="number" name="Vikt" placeholder="Vikt (gram)" required>

    <input type="text" name="datum" placeholder="Datum"
      onfocus="this.type='date'"
      onblur="if(!this.value)this.type='text'"
      required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3KpZo67xriKcCMPYvLSuNNYn-SUxbEdDs8seSOD_T7Ky8eC9UzSxtp1Mj_jT5NHykNg/exec";

function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];
  let imageBase64 = file ? await toBase64(file) : "";

  const payload = {
    Deltagare: form.Deltagare.value,
    Art: form.Art.value,
    Vikt: form.Vikt.value,
    datum: form.datum.value,
    image: imageBase64
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: new URLSearchParams(payload)
  });

  document.getElementById("success").style.display = "block";
  form.reset();
});

document.querySelectorAll(".custom-select").forEach(select => {
  const selected = select.querySelector(".selected");
  const options = select.querySelector(".options");
  const hidden = document.querySelector(`input[name="${select.dataset.name}"]`);

  selected.onclick = () => {
    options.style.display = options.style.display === "block" ? "none" : "block";
  };

  options.querySelectorAll("div").forEach(opt => {
    opt.onclick = () => {
      selected.textContent = opt.textContent;
      selected.classList.add("active");
      hidden.value = opt.textContent;
      options.style.display = "none";
    };
  });
});
</script>

</body>
</html>
