<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Registrera fångst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      background: #f1f5f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    h1 {
      text-align: center;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      background: #22c55e;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
    }

    button:active {
      transform: scale(0.98);
    }

    .success {
      display: none;
      text-align: center;
      color: green;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Registrera fångst</h1>

  <form id="form">

   <label>Deltagare</label>
<select name="Deltagare" required>
  <option value="">Välj deltagare</option>
  <option>Lars Boström</option>
  <option>Oliver Jansson</option>
  <option>Anders Boström</option>
  <option>Stefan Widh</option>
  <option>Roger Norling</option>
  <option>Micke Karlsson</option>
  <option>Emil Larsson</option>
  <option>Sonny Pettersson</option>
  <option>Christian Rebello</option>
  <option>Patrik Byström</option>
  <option>Jonny Jansson</option>
  <option>Kent Boström</option>
  <option>Mattias Roming</option>
  <option>Anton Lundholm</option>
  <option>Robban Lager</option>
  <option>Jonatan Boström</option>
  <option>Anders Wimmerstedt</option>
</select>

    <label>Art</label>
<select name="Art" required>
  <option value="">Välj art</option>
  <option>Björkna</option>
  <option>Brax</option>
  <option>Id</option>
  <option>Mört</option>
  <option>Ruda</option>
  <option>Sarv</option>
  <option>Sutare</option>
  <option>Vimma</option>
</select>

    <label>Vikt (gram)</label>
    <input type="number" name="Vikt" required>

    <label>Datum</label>
    <input type="date" name="datum" id="datum" required>

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwOQKDUbpEiBb-GRecv-aMKFJVN3TQFoGxog2DqBi3evtu_SvtTaYEh68ycTS5GsSvnrA/exec";

const form = document.getElementById("form");
const datumInput = document.getElementById("datum");

// sätt dagens datum
datumInput.value = new Date().toISOString().split("T")[0];

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    Deltagare: form.elements["Deltagare"].value,
    Art: form.elements["Art"].value,
    Vikt: form.elements["Vikt"].value,
    datum: form.elements["datum"].value
  };

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    document.getElementById("success").style.display = "block";
    form.reset();
    datumInput.value = new Date().toISOString().split("T")[0];

  } catch (err) {
    alert("Fel vid sparning");
    console.error(err);
  }
});
</script>

</body>
</html>
