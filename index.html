<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Specimen Trophy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      background: linear-gradient(180deg, #0b0f14, #111827);
      margin: 0;
      padding: 16px;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      background: #1f2937;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    /* LOGGA */
    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo {
      max-width: 260px;
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(255, 140, 0, 0.4);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select {
      padding: 14px;
      border-radius: 12px;
      border: none;
      text-align: center;
      background: #111827;
      color: white;
      font-size: 16px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    select {
      color: #9ca3af;
    }

    button {
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 15px rgba(34,197,94,0.5);
    }

    .success {
      display: none;
      text-align: center;
      margin-top: 10px;
      color: #4ade80;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <img src="images/logo.png" alt="Specimen Trophy" class="logo">
  </div>

  <form id="form">

    <select name="Deltagare" required>
      <option value="">Deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <select name="Art" required>
      <option value="">Art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <input type="number" name="Vikt" placeholder="Vikt (gram)" required>

    <input type="text" name="datum" placeholder="Datum"
      onfocus="this.type='date'"
      onblur="if(!this.value)this.type='text'"
      required>

    <input type="file" id="image" accept="image/*">

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">✔ Sparat!</div>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3KpZo67xriKcCMPYvLSuNNYn-SUxbEdDs8seSOD_T7Ky8eC9UzSxtp1Mj_jT5NHykNg/exec";

function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const file = document.getElementById("image").files[0];
  let imageBase64 = "";

  if (file) {
    imageBase64 = await toBase64(file);
  }

  const payload = {
    Deltagare: form.Deltagare.value,
    Art: form.Art.value,
    Vikt: form.Vikt.value,
    datum: form.datum.value,
    image: imageBase64
  };

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: new URLSearchParams(payload)
  });

  document.getElementById("success").style.display = "block";
  form.reset();
});

</script>

</body>
</html>
