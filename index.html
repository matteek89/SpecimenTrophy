<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Specimen Trophy</title>

<style>
:root{
  --text:#f3f4f6;
  --muted:rgba(255,255,255,.58);
  --accent:#33b5ff;
  --accent-2:#0a84ff;
  --green:#19d458;
  --error:#ff6b6b;
}

*{box-sizing:border-box}

html,body{
  min-height:100%;
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

body{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:10px 8px;
  background:
    linear-gradient(rgba(0,8,18,.42),rgba(0,8,18,.68)),
    url("images/sunset_background_for_github.jpg") center center / cover no-repeat fixed,
    #02070f;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(circle at 50% 0%, rgba(51,181,255,.14), transparent 24%),
    radial-gradient(circle at 80% 25%, rgba(10,132,255,.10), transparent 18%),
    radial-gradient(circle at 20% 20%, rgba(120,210,255,.05), transparent 24%),
    linear-gradient(to bottom, rgba(10,132,255,.03), transparent 25%);
}

.page{
  position:relative;
  z-index:1;
  width:100%;
  max-width:430px;
  display:flex;
  justify-content:center;
}

.frame{
  width:100%;
  max-width:370px;
  padding:4px;
  border-radius:26px;
  position:relative;
  background:linear-gradient(180deg, rgba(58,186,255,.96), rgba(0,92,184,.86));
  box-shadow:
    0 0 0 1px rgba(58,186,255,.96),
    0 0 10px rgba(51,181,255,.30),
    0 0 20px rgba(10,132,255,.14),
    0 14px 28px rgba(0,0,0,.28);
}

.frame::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:26px;
  pointer-events:none;
  box-shadow:
    inset 0 0 0 1px rgba(164,230,255,.92),
    0 0 8px rgba(51,181,255,.14);
}

.panel{
  width:100%;
  background:
    linear-gradient(180deg, rgba(5,14,30,.92), rgba(1,7,18,.97));
  border:1px solid rgba(51,181,255,.14);
  border-radius:22px;
  padding:12px 10px 14px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 8px 20px rgba(0,0,0,.20);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  position:relative;
  overflow:visible;
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:22px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.04), transparent 18%, transparent 82%, rgba(51,181,255,.03));
}

.page-switch{
  position:absolute;
  top:10px;
  right:10px;
  z-index:50;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:84px;
  height:32px;
  padding:0 10px;
  border-radius:12px;
  text-decoration:none;
  color:#ffffff;
  font-size:12px;
  font-weight:700;
  border:1px solid rgba(51,181,255,.30);
  background:linear-gradient(180deg, rgba(2,11,23,.96), rgba(3,18,38,.90));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 4px 10px rgba(0,0,0,.16),
    0 0 8px rgba(51,181,255,.08);
}

.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
  position:relative;
  z-index:1;
  padding-top:42px;
}

.logo{
  width:min(100%,180px);
  display:block;
  border-radius:22px;
  box-shadow:
    0 0 12px rgba(51,181,255,.24),
    0 0 26px rgba(10,132,255,.16);
}

form{
  display:flex;
  flex-direction:column;
  gap:10px;
  position:relative;
  z-index:2;
}

.field,
.custom-select{
  position:relative;
  display:grid;
  grid-template-columns:26px 1fr 20px;
  align-items:center;
  gap:10px;
  min-height:66px;
  padding:11px 12px;
  border-radius:16px;
  background:linear-gradient(90deg, rgba(2,11,23,.95), rgba(3,18,38,.88));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.03),
    0 6px 14px rgba(0,0,0,.14);
}

.field-icon,
.field-end{
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent);
}

.field-label{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.92);
  margin-bottom:4px;
}

.submit-btn{
  margin-top:4px;
  height:54px;
  border:0;
  border-radius:16px;
  font-size:18px;
  font-weight:800;
  color:white;
  cursor:pointer;
  background:linear-gradient(180deg, #29d454 0%, #12b341 50%, #079734 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    0 0 12px rgba(28,209,79,.22),
    0 8px 18px rgba(0,0,0,.22);
}
</style>
</head>

<body>
<div class="page">
  <div class="frame">
    <div class="panel">

      <a href="topplistor.html" class="page-switch">Topplistor</a>

      <div class="logo-wrap">
        <img src="images/Specimenlogo2.png" alt="Specimen Trophy" class="logo">
      </div>

      <!-- BEHÅLL RESTEN AV DIN HTML FORM EXAKT SOM DEN ÄR -->
      <!-- ALLT UNDER FORM KAN DU KLISTRA IN FRÅN DIN NUVARANDE FIL -->

    </div>
  </div>
</div>

<!-- BEHÅLL HELA DIN JAVASCRIPT-KOD EXAKT SOM DEN ÄR -->

</body>
</html>
