<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Registrera fångst</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#22c55e">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(180deg, #dbeafe, #f8fafc);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 6px 0 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      background: #f9fafb;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
    }

    input[type="date"] {
      min-height: 48px;
    }

    input[type="file"] {
      padding: 10px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 12px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .success {
      display: none;
      text-align: center;
      color: #16a34a;
      font-weight: bold;
      margin-top: 12px;
    }

    .preview {
      text-align: center;
      margin-top: 10px;
    }

    .preview img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        padding-top: 20px;
      }

      .container {
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🎣 Registrera fångst</h1>

  <form id="form">

    <label>Deltagare</label>
    <select name="namn" required>
      <option value="">Välj deltagare</option>
      <option>Lars Boström</option>
      <option>Oliver Jansson</option>
      <option>Anders Boström</option>
      <option>Stefan Widh</option>
      <option>Roger Norling</option>
      <option>Micke Karlsson</option>
      <option>Emil Larsson</option>
      <option>Sonny Pettersson</option>
      <option>Christian Rebello</option>
      <option>Patrik Byström</option>
      <option>Jonny Jansson</option>
      <option>Kent Boström</option>
      <option>Mattias Roming</option>
      <option>Anton Lundholm</option>
      <option>Robban Lager</option>
      <option>Jonatan Boström</option>
      <option>Anders Wimmerstedt</option>
    </select>

    <label>Art</label>
    <select name="art" required>
      <option value="">Välj art</option>
      <option>Björkna</option>
      <option>Brax</option>
      <option>Id</option>
      <option>Mört</option>
      <option>Ruda</option>
      <option>Sarv</option>
      <option>Sutare</option>
      <option>Vimma</option>
    </select>

    <label>Vikt (gram)</label>
    <input type="number" name="vikt" required>

    <label for="datum">Datum</label>
    <input type="date" name="datum" id="datum" required>

    <label>Bild (valfri)</label>
    <input type="file" name="bild" accept="image/*" id="bildInput">

    <div class="preview" id="preview"></div>

    <button type="submit">Spara</button>
  </form>

  <div class="success" id="success">
    ✔ Sparat!
  </div>
</div>

<script>
  const supabaseUrl = "https://rwfwlcqdacrplboditbw.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3ZndsY3FkYWNycGxib2RpdGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDQ3MDIsImV4cCI6MjA5MTA4MDcwMn0.OKyxCiyaDdAMgMG0lBVyJ420Hu1yyF4pm0mV3RJUw3g";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  // Sätt dagens datum
  const idag = new Date().toISOString().split("T")[0];
  document.getElementById("datum").value = idag;

  // Bild preview
  document.getElementById("bildInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById("preview");

    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        preview.innerHTML = `<img src="${event.target.result}">`;
      };
      reader.readAsDataURL(file);
    }
  });

  // Submit
  document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = document.getElementById("form");

    const namn = form.namn.value;
    const art = form.art.value;
    const vikt = parseInt(form.vikt.value);
    const datum = form.datum.value;
    const bild = form.bild.files[0];

    let bild_url = null;

    if (bild) {
      const filnamn = Date.now() + "_" + bild.name;

      const { error: uploadError } = await supabaseClient.storage
        .from("bilder")
        .upload(filnamn, bild);

      if (!uploadError) {
        const { data } = supabaseClient.storage
          .from("bilder")
          .getPublicUrl(filnamn);

        bild_url = data.publicUrl;
      } else {
        alert("Fel vid bilduppladdning");
        return;
      }
    }

    const { error } = await supabaseClient
      .from("fangster")
      .insert([{ namn, art, vikt, datum, bild_url }]);

    if (error) {
      alert("Fel vid sparning");
      return;
    }

    document.getElementById("success").style.display = "block";
    form.reset();
    document.getElementById("preview").innerHTML = "";

    document.getElementById("datum").value = idag;
  });
</script>

</body>
</html>
